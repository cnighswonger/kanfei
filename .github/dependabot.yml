version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    groups:
      web-framework:
        patterns:
          - "fastapi"
          - "uvicorn"
          - "pydantic-settings"
          - "python-multipart"
      database:
        patterns:
          - "sqlalchemy"
          - "alembic"
      ai-providers:
        patterns:
          - "anthropic"
          - "openai"
      nexrad:
        patterns:
          - "arm-pyart"
          - "boto3"
          - "numpy"
          - "matplotlib"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
          - "@types/react"
          - "@types/react-dom"
      charts-maps:
        patterns:
          - "highcharts"
          - "highcharts-react-official"
          - "leaflet"
          - "react-leaflet"
          - "@types/leaflet"
      build-tools:
        patterns:
          - "vite"
          - "@vitejs/plugin-react"
          - "typescript"
          - "typescript-eslint"
      lint:
        patterns:
          - "eslint"
          - "eslint-plugin-*"
          - "@eslint/*"
    ignore:
      # TypeScript 6.x incompatible with typescript-eslint (2026-03-30)
      - dependency-name: "typescript"
        versions: [">=6.0.0"]
      # ESLint 10.x requires full lint toolchain upgrade (2026-03-30)
      - dependency-name: "eslint"
        versions: [">=10.0.0"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "ci"
