# Kanfei Weather Station Configuration
# Edit this file and restart services: sudo systemctl restart kanfei-logger kanfei-web

# Serial port (check: ls /dev/ttyUSB* /dev/ttyS*)
KANFEI_SERIAL_PORT=/dev/ttyUSB0
KANFEI_BAUD_RATE=2400

# Database
KANFEI_DB_PATH=/var/lib/kanfei/kanfei.db

# Location (set via Settings page or here)
KANFEI_LATITUDE=0.0
KANFEI_LONGITUDE=0.0
KANFEI_ELEVATION_FT=0

# Server
KANFEI_HOST=0.0.0.0
KANFEI_PORT=8000
