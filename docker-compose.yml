services:
  kanfei:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - kanfei-data:/app/data
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    environment:
      - KANFEI_SERIAL_PORT=/dev/ttyUSB0
      - KANFEI_BAUD_RATE=19200
      - KANFEI_DB_PATH=/app/data/kanfei.db
    restart: unless-stopped

volumes:
  kanfei-data:
